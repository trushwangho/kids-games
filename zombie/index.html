<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>뼈다귀 좀비 막기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1a1530;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; gap: 28px; z-index: 10;
    background: radial-gradient(circle at 50% 35%, #2d2456 0%, #161127 80%);
  }
  .hidden { display: none !important; }

  h1 { font-size: clamp(34px, 9vw, 72px); font-weight: 800; letter-spacing: -1px;
       text-shadow: 0 4px 0 #6b4a1a; color: #ffe14d; }
  h1 .sub { display:block; font-size: clamp(16px,4vw,26px); color:#9be36f; margin-top:8px; text-shadow:none; font-weight:700;}
  .desc { font-size: clamp(15px, 3.6vw, 20px); line-height: 1.6; color: #cfc6ee; max-width: 620px; padding: 0 24px; }

  .btn-row { display: flex; flex-direction: column; gap: 16px; width: min(86vw, 360px); }
  button.lvl {
    font-family: inherit; font-weight: 800; font-size: clamp(20px, 5vw, 26px);
    color: #1a1530; border: none; border-radius: 22px; padding: 20px 16px;
    cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.3); transition: transform .06s, box-shadow .06s;
  }
  button.lvl:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  .easy { background: linear-gradient(#a8f06a,#7bd13e); }
  .mid  { background: linear-gradient(#ffd24d,#f5a623); }
  .hard { background: linear-gradient(#ff8a5c,#ef5a32); }
  .lvl small { display:block; font-size:14px; font-weight:600; opacity:.8; margin-top:4px;}

  button.again {
    font-family: inherit; font-weight: 800; font-size: clamp(20px,5vw,26px);
    color:#1a1530; background: linear-gradient(#a8f06a,#7bd13e); border:none;
    border-radius: 22px; padding: 18px 44px; cursor:pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
  }
  button.again:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  .score-big { font-size: clamp(48px,14vw,110px); font-weight:800; color:#ffe14d; text-shadow:0 4px 0 #6b4a1a;
               font-variant-numeric: tabular-nums; }
  .gameover-title { font-size: clamp(30px,8vw,56px); font-weight:800; color:#ff7a7a; }

  /* in-game HUD */
  #hud {
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:center;
    padding: 14px 18px; pointer-events:none;
  }
  #hearts { font-size: clamp(26px,7vw,40px); letter-spacing:4px; }
  #scoreHud { font-size: clamp(22px,6vw,34px); font-weight:800; color:#ffe14d;
              font-variant-numeric: tabular-nums; text-shadow:0 2px 0 #6b4a1a; }
  #pauseBtn {
    pointer-events:auto; font-family:inherit; font-weight:800; font-size:18px;
    color:#fff; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4);
    border-radius:14px; padding:8px 16px; cursor:pointer;
  }
  .credit { position:absolute; bottom:16px; font-size:13px; color:#7d75a0; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="hearts"></div>
    <div id="scoreHud">0</div>
    <button id="pauseBtn">멈춤</button>
  </div>

  <!-- 시작 화면 -->
  <div id="startScreen" class="screen">
    <h1>뼈다귀 좀비 막기<span class="sub">집에 닿기 전에 톡! 톡!</span></h1>
    <p class="desc">좀비와 괴물이 집으로 걸어와요.<br>닿기 전에 손가락으로 톡 누르면 뼈가 와르르 튀어요.<br>난이도를 골라서 시작!</p>
    <div class="btn-row">
      <button class="lvl easy" data-lvl="easy">쉬움<small>천천히 오는 좀비, 느긋하게</small></button>
      <button class="lvl mid"  data-lvl="mid">중간<small>좀 더 빠르고 많아져요</small></button>
      <button class="lvl hard" data-lvl="hard">어려움<small>빠른 좀비와 튼튼한 괴물</small></button>
    </div>
    <div class="credit">아빠가 만든 게임</div>
  </div>

  <!-- 멈춤 화면 -->
  <div id="pauseScreen" class="screen hidden">
    <h1>잠깐 쉬는 중</h1>
    <button class="again" id="resumeBtn">계속하기</button>
    <button class="again" id="quitBtn" style="background:linear-gradient(#ffd24d,#f5a623)">처음으로</button>
  </div>

  <!-- 게임오버 화면 -->
  <div id="overScreen" class="screen hidden">
    <div class="gameover-title">게임 끝!</div>
    <p class="desc" id="overMsg"></p>
    <div class="score-big" id="finalScore">0</div>
    <button class="again" id="restartBtn">다시 하기</button>
    <button class="again" id="homeBtn" style="background:linear-gradient(#ffd24d,#f5a623)">처음으로</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---------- 화면 크기 ----------
  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    computeLanes();
  }
  window.addEventListener("resize", resize);

  // ---------- 소리 (Web Audio, 파일 없이 생성) ----------
  let actx = null;
  function audio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
  function beep(freq, dur, type, vol){
    const a = audio(); if(!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || "square"; o.frequency.value = freq;
    g.gain.value = vol==null?0.18:vol;
    o.connect(g); g.connect(a.destination);
    const t = a.currentTime;
    o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.stop(t + dur);
  }
  function sndHit(){ beep(440,0.06,"square",0.2); setTimeout(()=>beep(660,0.08,"square",0.18),40); }
  function sndBoss(){ beep(180,0.12,"sawtooth",0.18); }
  function sndLose(){ beep(160,0.18,"sawtooth",0.22); setTimeout(()=>beep(110,0.25,"sawtooth",0.2),120); }
  function sndOver(){ beep(300,0.2,"triangle",0.2); setTimeout(()=>beep(200,0.3,"triangle",0.2),180); setTimeout(()=>beep(120,0.4,"triangle",0.2),380); }
  function sndStart(){ beep(523,0.1,"square",0.2); setTimeout(()=>beep(784,0.14,"square",0.2),110); }

  // ---------- 게임 상태 ----------
  const DIFF = {
    easy: { speed: 26, spawn: 1.55, bossChance: 0.06, fastChance: 0.0,  hearts: 5, ramp: 0.0006 },
    mid:  { speed: 40, spawn: 1.15, bossChance: 0.14, fastChance: 0.18, hearts: 4, ramp: 0.0011 },
    hard: { speed: 58, spawn: 0.85, bossChance: 0.22, fastChance: 0.34, hearts: 3, ramp: 0.0018 }
  };

  let state = "menu"; // menu | play | pause | over
  let cfg = null;
  let score = 0, hearts = 0, maxHearts = 0;
  let enemies = [], bones = [], pops = [];
  let spawnTimer = 0, elapsed = 0, speedMul = 1;
  let lanes = [];          // 좀비가 걷는 가로 길들
  let homeX = 0;           // 집 위치(오른쪽)
  let lastTime = 0;

  function computeLanes(){
    const top = Math.max(90, H*0.18);
    const bottom = H - Math.max(70, H*0.12);
    const n = H < 520 ? 3 : 4;
    lanes = [];
    for(let i=0;i<n;i++){
      lanes.push(top + (bottom-top) * (n===1?0.5:i/(n-1)));
    }
    homeX = W - Math.max(46, W*0.10);
  }

  // ---------- 적 ----------
  function spawnEnemy(){
    const lane = lanes[(Math.random()*lanes.length)|0];
    let type = "zombie";
    const r = Math.random();
    if(r < cfg.bossChance) type = "boss";
    else if(r < cfg.bossChance + cfg.fastChance) type = "fast";

    const base = cfg.speed * speedMul;
    let e = {
      x: -50, y: lane, type,
      r: type==="boss"?38:28,
      speed: type==="fast" ? base*1.7 : (type==="boss"? base*0.62 : base),
      hp: type==="boss"?2:1,
      wob: Math.random()*Math.PI*2,
      hitFlash: 0
    };
    enemies.push(e);
  }

  function tap(px, py){
    if(state !== "play") return;
    // 가장 가까운(맞은) 적 찾기 — 위에서 그려진 순서 무시, 거리 우선
    let best = -1, bestD = 1e9;
    for(let i=0;i<enemies.length;i++){
      const e = enemies[i];
      const dx = px - e.x, dy = py - e.y;
      const d = dx*dx + dy*dy;
      const rr = (e.r + 18) * (e.r + 18); // 손가락 여유
      if(d <= rr && d < bestD){ bestD = d; best = i; }
    }
    if(best >= 0){
      const e = enemies[best];
      e.hp -= 1;
      e.hitFlash = 0.18;
      spawnBones(e.x, e.y, e.type==="boss"?14:8);
      if(e.hp <= 0){
        score += (e.type==="boss"?3:1);
        popText(e.x, e.y, e.type==="boss"?"+3":"+1");
        enemies.splice(best,1);
        if(e.type==="boss") sndBoss(); else sndHit();
      } else {
        sndBoss(); // 괴물 1차 타격
      }
      updateHud();
    }
  }

  function spawnBones(x,y,n){
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, sp = 60+Math.random()*180;
      bones.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 60,
                   rot: Math.random()*Math.PI, vr:(Math.random()-0.5)*10,
                   life: 0.9+Math.random()*0.4, max: 1.3, sz: 6+Math.random()*6 });
    }
  }
  function popText(x,y,t){ pops.push({x,y,t,life:0.8}); }

  // ---------- 업데이트 ----------
  function update(dt){
    elapsed += dt;
    speedMul = 1 + elapsed * cfg.ramp;

    spawnTimer -= dt;
    if(spawnTimer <= 0){
      spawnEnemy();
      spawnTimer = cfg.spawn * (0.7 + Math.random()*0.6) / Math.sqrt(speedMul);
    }

    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      e.x += e.speed * dt;
      e.wob += dt*6;
      if(e.hitFlash>0) e.hitFlash -= dt;
      if(e.x >= homeX){
        enemies.splice(i,1);
        hearts -= 1;
        popText(homeX, e.y, "-1");
        sndLose();
        updateHud();
        if(hearts <= 0){ gameOver(); return; }
      }
    }
    for(let i=bones.length-1;i>=0;i--){
      const b = bones[i];
      b.vy += 520*dt; b.x += b.vx*dt; b.y += b.vy*dt; b.rot += b.vr*dt;
      b.life -= dt;
      if(b.life<=0) bones.splice(i,1);
    }
    for(let i=pops.length-1;i>=0;i--){
      pops[i].y -= 40*dt; pops[i].life -= dt;
      if(pops[i].life<=0) pops.splice(i,1);
    }
  }

  // ---------- 그리기 ----------
  function draw(){
    // 배경 — 밤하늘 + 잔디
    const grassY = lanes.length? lanes[0]-50 : H*0.2;
    let g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#241c47"); g.addColorStop(0.45,"#2e2658"); g.addColorStop(1,"#3a7a3a");
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // 달
    ctx.fillStyle = "#fff7cf"; ctx.beginPath(); ctx.arc(W*0.16, H*0.12, 26, 0, Math.PI*2); ctx.fill();

    // 길(연한 흙길) — 각 레인
    ctx.strokeStyle = "rgba(120,90,60,0.35)"; ctx.lineWidth = 46; ctx.lineCap="round";
    for(const ly of lanes){
      ctx.beginPath(); ctx.moveTo(0, ly+18); ctx.lineTo(homeX, ly+18); ctx.stroke();
    }

    // 집
    drawHouse(homeX, H*0.5);

    // 좀비/괴물
    for(const e of enemies) drawEnemy(e);
    // 뼈
    for(const b of bones) drawBone(b);
    // 점수 팝업
    ctx.textAlign="center"; ctx.font="800 26px -apple-system, sans-serif";
    for(const p of pops){
      ctx.globalAlpha = Math.max(0, p.life/0.8);
      ctx.fillStyle = p.t.startsWith("-") ? "#ff8a8a" : "#ffe14d";
      ctx.fillText(p.t, p.x, p.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawHouse(x,y){
    const s = 40;
    ctx.save(); ctx.translate(x+22, y);
    // 몸체
    ctx.fillStyle = "#e8d6a8"; ctx.fillRect(-s, -s*0.7, s*1.6, s*1.4);
    // 지붕
    ctx.fillStyle = "#c0533b"; ctx.beginPath();
    ctx.moveTo(-s-8, -s*0.7); ctx.lineTo(s*0.6+8, -s*0.7); ctx.lineTo(s*0.6-12, -s*1.4); ctx.lineTo(-s+12,-s*1.4); ctx.closePath(); ctx.fill();
    // 문
    ctx.fillStyle = "#7a4a2a"; ctx.fillRect(-s*0.25, -s*0.1, s*0.5, s*0.8);
    ctx.restore();
  }

  function drawEnemy(e){
    const bob = Math.sin(e.wob)*4;
    ctx.save();
    ctx.translate(e.x, e.y + bob);
    const flash = e.hitFlash>0;
    // 그림자
    ctx.fillStyle="rgba(0,0,0,0.22)"; ctx.beginPath();
    ctx.ellipse(0, e.r+8-bob, e.r*0.8, e.r*0.28, 0,0,Math.PI*2); ctx.fill();

    if(e.type==="boss"){
      // 큰 보라 괴물
      ctx.fillStyle = flash? "#fff" : "#9b5cf0";
      roundBody(0,0,e.r);
      // 뿔
      ctx.fillStyle = flash?"#fff":"#6b3fb0";
      ctx.beginPath(); ctx.moveTo(-e.r*0.5,-e.r*0.7); ctx.lineTo(-e.r*0.2,-e.r*1.15); ctx.lineTo(-e.r*0.05,-e.r*0.7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(e.r*0.5,-e.r*0.7); ctx.lineTo(e.r*0.2,-e.r*1.15); ctx.lineTo(e.r*0.05,-e.r*0.7); ctx.fill();
      eyes(e.r, flash, "#fff", "#1a1530", 1.1);
      // 이빨
      ctx.fillStyle="#fff"; mouthTeeth(e.r);
    } else if(e.type==="fast"){
      // 빨강 빠른 좀비
      ctx.fillStyle = flash? "#fff" : "#ff7a5c";
      roundBody(0,0,e.r);
      eyes(e.r, flash, "#fff", "#1a1530", 1);
      ctx.strokeStyle="#7a2a1a"; ctx.lineWidth=3; ctx.beginPath();
      ctx.moveTo(-e.r*0.4, e.r*0.35); ctx.lineTo(e.r*0.4, e.r*0.35); ctx.stroke();
      // 스피드 표시 점선
      ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(-e.r-14,0); ctx.lineTo(-e.r-4,0); ctx.stroke();
    } else {
      // 기본 초록 좀비
      ctx.fillStyle = flash? "#fff" : "#7bd13e";
      roundBody(0,0,e.r);
      // 머리 위 풀 한 가닥
      ctx.strokeStyle = flash?"#fff":"#4a9a1e"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.quadraticCurveTo(6,-e.r-12,2,-e.r-16); ctx.stroke();
      eyes(e.r, flash, "#fff", "#1a1530", 1);
      ctx.strokeStyle="#3a7a18"; ctx.lineWidth=3; ctx.beginPath();
      ctx.moveTo(-e.r*0.35, e.r*0.35); ctx.lineTo(e.r*0.35, e.r*0.4); ctx.stroke();
    }
    ctx.restore();
  }
  function roundBody(x,y,r){
    ctx.beginPath();
    ctx.moveTo(x-r, y+r*0.6);
    ctx.lineTo(x-r, y-r*0.2);
    ctx.arc(x, y-r*0.2, r, Math.PI, 0);
    ctx.lineTo(x+r, y+r*0.6);
    ctx.quadraticCurveTo(x+r, y+r, x+r*0.6, y+r);
    ctx.lineTo(x-r*0.6, y+r);
    ctx.quadraticCurveTo(x-r, y+r, x-r, y+r*0.6);
    ctx.fill();
  }
  function eyes(r, flash, white, pupil, sc){
    const ex = r*0.38*sc, ey = -r*0.1, er = r*0.22*sc;
    ctx.fillStyle = flash?"#1a1530":white;
    ctx.beginPath(); ctx.arc(-ex,ey,er,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = flash?white:pupil;
    ctx.beginPath(); ctx.arc(-ex+er*0.2,ey,er*0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+er*0.2,ey,er*0.5,0,Math.PI*2); ctx.fill();
  }
  function mouthTeeth(r){
    const y=r*0.35;
    ctx.beginPath();
    for(let i=-2;i<=2;i++){
      ctx.moveTo(i*r*0.18, y);
      ctx.lineTo(i*r*0.18+r*0.07, y+r*0.22);
      ctx.lineTo(i*r*0.18-r*0.07, y+r*0.22);
    }
    ctx.fill();
  }
  function drawBone(b){
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot);
    ctx.globalAlpha = Math.min(1, b.life/0.4);
    ctx.fillStyle = "#fdfbf0";
    const L = b.sz*2.2, k = b.sz*0.6;
    ctx.beginPath();
    ctx.arc(-L/2,-k,k,0,Math.PI*2); ctx.arc(-L/2,k,k,0,Math.PI*2);
    ctx.arc(L/2,-k,k,0,Math.PI*2); ctx.arc(L/2,k,k,0,Math.PI*2);
    ctx.fill();
    ctx.fillRect(-L/2,-k*0.8,L,k*1.6);
    ctx.restore(); ctx.globalAlpha=1;
  }

  // ---------- 루프 ----------
  function loop(t){
    if(!lastTime) lastTime = t;
    let dt = (t - lastTime)/1000; lastTime = t;
    if(dt > 0.05) dt = 0.05; // 탭 전환 등으로 튀는 것 방지
    if(state === "play"){ update(dt); }
    if(state === "play" || state === "pause"){ draw(); }
    requestAnimationFrame(loop);
  }

  // ---------- HUD ----------
  const hud = document.getElementById("hud");
  const heartsEl = document.getElementById("hearts");
  const scoreHud = document.getElementById("scoreHud");
  function updateHud(){
    let s="";
    for(let i=0;i<maxHearts;i++) s += (i<hearts? "♥":"♡");
    heartsEl.textContent = s;
    heartsEl.style.color = hearts<=1? "#ff6b6b":"#ff9bb5";
    scoreHud.textContent = score;
  }

  // ---------- 화면 전환 ----------
  const startScreen = document.getElementById("startScreen");
  const pauseScreen = document.getElementById("pauseScreen");
  const overScreen  = document.getElementById("overScreen");

  function show(el){ [startScreen,pauseScreen,overScreen].forEach(s=>s.classList.add("hidden")); if(el) el.classList.remove("hidden"); }

  function startGame(level){
    cfg = DIFF[level];
    score = 0; hearts = cfg.hearts; maxHearts = cfg.hearts;
    enemies = []; bones = []; pops = [];
    spawnTimer = 0.6; elapsed = 0; speedMul = 1; lastTime = 0;
    computeLanes();
    updateHud();
    hud.classList.remove("hidden");
    show(null);
    state = "play";
    sndStart();
  }

  function gameOver(){
    state = "over";
    hud.classList.add("hidden");
    document.getElementById("finalScore").textContent = score;
    let msg;
    if(score >= 40) msg = "우와! 좀비 박사님이다!";
    else if(score >= 20) msg = "정말 잘했어요!";
    else if(score >= 8) msg = "좋아요! 한 번 더 해볼까요?";
    else msg = "다시 도전!";
    document.getElementById("overMsg").textContent = msg;
    show(overScreen);
    sndOver();
  }

  function goHome(){ state="menu"; hud.classList.add("hidden"); show(startScreen); }

  // ---------- 입력 ----------
  function pointFromEvent(ev){
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if(ev.touches && ev.touches.length){ cx = ev.touches[0].clientX; cy = ev.touches[0].clientY; }
    else if(ev.changedTouches && ev.changedTouches.length){ cx = ev.changedTouches[0].clientX; cy = ev.changedTouches[0].clientY; }
    else { cx = ev.clientX; cy = ev.clientY; }
    return { x: cx - rect.left, y: cy - rect.top };
  }
  // 터치 (멀티터치 — 여러 좀비 동시 처치)
  canvas.addEventListener("touchstart", function(ev){
    if(state!=="play") return;
    ev.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for(let i=0;i<ev.touches.length;i++){
      tap(ev.touches[i].clientX-rect.left, ev.touches[i].clientY-rect.top);
    }
  }, {passive:false});
  // 마우스
  canvas.addEventListener("mousedown", function(ev){
    if(state!=="play") return;
    const p = pointFromEvent(ev); tap(p.x, p.y);
  });

  // 버튼들
  document.querySelectorAll("button.lvl").forEach(b=>{
    b.addEventListener("click", ()=>{ audio(); startGame(b.getAttribute("data-lvl")); });
  });
  document.getElementById("pauseBtn").addEventListener("click", ()=>{
    if(state==="play"){ state="pause"; show(pauseScreen); }
  });
  document.getElementById("resumeBtn").addEventListener("click", ()=>{
    if(state==="pause"){ show(null); state="play"; lastTime=0; }
  });
  document.getElementById("quitBtn").addEventListener("click", goHome);
  document.getElementById("restartBtn").addEventListener("click", ()=>{ startGame(currentLevelKey()); });
  document.getElementById("homeBtn").addEventListener("click", goHome);

  let _lastLevel = "easy";
  function currentLevelKey(){ return _lastLevel; }
  document.querySelectorAll("button.lvl").forEach(b=>{
    b.addEventListener("click", ()=>{ _lastLevel = b.getAttribute("data-lvl"); });
  });

  // 시작
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
